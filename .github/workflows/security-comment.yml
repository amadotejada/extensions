name: Security comment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "extensions/**"
      - "scripts/security-comment.mjs"
      - ".github/workflows/security-comment.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: security-comment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment:
    name: Analyse changed extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine changed extensions
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          names="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- extensions/ \
            | awk -F/ 'NF>1 && $1=="extensions" {print $2}' \
            | sort -u)"

          valid=""
          for name in $names; do
            if ! printf '%s' "$name" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]*$'; then
              continue
            fi
            if [ ! -f "extensions/$name/package.json" ]; then
              continue
            fi
            valid="$valid $name"
          done
          valid="$(printf '%s' "$valid" | sed 's/^ *//')"
          echo "names=$valid" >> "$GITHUB_OUTPUT"
          echo "Changed extensions: ${valid:-<none>}"

      - name: Generate security report
        id: report
        if: steps.changed.outputs.names != ''
        env:
          NAMES: ${{ steps.changed.outputs.names }}
        run: |
          set -euo pipefail
          node scripts/security-comment.mjs $NAMES > security-report.md
          {
            echo "body<<MUXY_EOF"
            cat security-report.md
            echo "MUXY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: steps.changed.outputs.names != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- muxy-extension-security-report -->";
            const body = process.env.REPORT_BODY;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const existing = comments.find(
              (c) => c.user?.type === "Bot" && c.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
        env:
          REPORT_BODY: ${{ steps.report.outputs.body }}
